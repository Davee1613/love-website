<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yay ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
overflow:hidden;
}

.card{
background:white;
padding:50px;
border-radius:25px;
text-align:center;
box-shadow:0 0 40px rgba(255,20,147,.6);
animation:glow 2s infinite alternate;
z-index:10;
}

@keyframes glow{
from{
box-shadow:0 0 20px #ff4d88;
}
to{
box-shadow:0 0 60px #ff4d88,0 0 100px #ff80bf;
}
}

h1{
font-size:50px;
color:#ff2e63;
margin-bottom:20px;
}

p{
font-size:22px;
color:#555;
margin-bottom:10px;
}

.heart{
font-size:80px;
animation:heartbeat 1s infinite;
filter:drop-shadow(0 0 20px red);
}

@keyframes heartbeat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.floating-heart{
position:absolute;
font-size:30px;
animation:float 8s linear infinite;
opacity:.8;
}

@keyframes float{
0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}
</style>

</head>
<body>

<div class="card">
<div class="heart">❤️</div>

<h1>YAY!!</h1>

<p>I knew you'd say YES 🥹❤️</p>

<p>Can't wait to hang out with you 🌹</p>

</div>

<script>

// Confetti
function fire(){
confetti({
particleCount:250,
spread:180,
origin:{y:0.6}
});
}

fire();
setInterval(fire,3000);

// Floating Hearts
setInterval(()=>{

const heart=document.createElement("div");

heart.className="floating-heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*40)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

},300);

</script>

</body>
</html>
